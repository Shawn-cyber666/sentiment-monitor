<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivo X300U 舆论监测 - 实时仪表板</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .card { background-color: #1e293b; border-radius: 0.5rem; padding: 1.5rem; }
        .metric { font-size: 1.875rem; font-weight: bold; }
        .label { color: #94a3b8; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen p-6">
                    <div className="mb-8">
                        <h1 className="text-4xl font-bold mb-2">Vivo X300U 舆论监测</h1>
                        <p className="text-slate-400">实时监测小红书、微博、B站的用户评论和舆论动向</p>
                    </div>

                    <div className="grid grid-cols-3 gap-6 mb-8">
                        <div className="card">
                            <p className="label">小红书评论</p>
                            <p className="metric">2,456</p>
                        </div>
                        <div className="card">
                            <p className="label">微博提及</p>
                            <p className="metric">1,823</p>
                        </div>
                        <div className="card">
                            <p className="label">B站视频</p>
                            <p className="metric">945</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-6 mb-8">
                        <div className="card">
                            <h2 className="text-xl font-bold mb-4">热门关键词</h2>
                            <div className="space-y-3">
                                {[
                                    { word: 'Vivo X300U', count: 245, sentiment: 8.5, trend: '+12%' },
                                    { word: '拍照效果', count: 189, sentiment: 8.2, trend: '+8%' },
                                    { word: '续航能力', count: 156, sentiment: 7.8, trend: '+5%' }
                                ].map((kw, idx) => (
                                    <div key={idx} className="flex justify-between items-center">
                                        <div>
                                            <p className="font-semibold">{kw.word}</p>
                                            <p className="text-sm text-slate-400">提及 {kw.count} 次</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-green-400 font-bold">{kw.sentiment}</p>
                                            <p className="text-xs text-slate-400">{kw.trend}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="card">
                            <h2 className="text-xl font-bold mb-4">整体情感分布</h2>
                            <div className="flex justify-around items-center mt-4">
                                <div className="text-center">
                                    <p className="text-2xl font-bold text-green-400">45%</p>
                                    <p className="text-sm text-slate-400">正面</p>
                                </div>
                                <div className="text-center">
                                    <p className="text-2xl font-bold text-gray-400">35%</p>
                                    <p className="text-sm text-slate-400">中立</p>
                                </div>
                                <div className="text-center">
                                    <p className="text-2xl font-bold text-red-400">20%</p>
                                    <p className="text-sm text-slate-400">负面</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card mb-8">
                        <h2 className="text-xl font-bold mb-4">代表性评论</h2>
                        <div className="space-y-4">
                            {[
                                { platform: '小红书', text: 'Vivo X300U 的拍照效果真的绝了！', sentiment: '正面', likes: 245 },
                                { platform: '微博', text: '续航能力很给力，一天用下来还有 15% 电量', sentiment: '正面', likes: 189 },
                                { platform: 'B站', text: '处理器性能稳定，玩游戏没有卡顿', sentiment: '正面', likes: 156 }
                            ].map((comment, idx) => (
                                <div key={idx} className="border-l-4 border-green-500 pl-4 py-2">
                                    <div className="flex justify-between mb-2">
                                        <span className="font-semibold text-blue-400">{comment.platform}</span>
                                        <span className="text-xs px-2 py-1 bg-green-500/20 text-green-400 rounded">{comment.sentiment}</span>
                                    </div>
                                    <p className="text-slate-300 mb-2">{comment.text}</p>
                                    <p className="text-xs text-slate-500">👍 {comment.likes} 个赞</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="text-center text-slate-400 text-sm">
                        <p>✅ 前端页面已成功加载</p>
                        <p className="text-xs text-slate-500 mt-2">Vivo X300U Sentiment Monitor v1.0</p>
                    </div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
